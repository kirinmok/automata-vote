<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automata 作品票選展</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #F7F3EE;
      --surface:   #FDFAF7;
      --border:    #E2D9CE;
      --border2:   #C8BDB0;
      --wood:      #A67C52;
      --wood-dark: #7A5533;
      --wood-pale: #D4B896;
      --ink:       #2C1F0E;
      --ink2:      #6B5240;
      --ink3:      #A08870;
      --accent:    #5C8A6E;
      --accent-bg: #EBF3EE;
      --tag-bg:    #EDE8E1;
      --warm:      #C17E3A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'Noto Serif TC', serif;
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 54px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--wood-dark);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-mark {
      width: 20px; height: 20px;
      border: 2px solid var(--wood);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--wood);
      font-family: 'DM Mono', monospace;
    }
    .header-right {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--ink3);
    }

    /* ── HERO ── */
    .hero {
      padding: 52px 40px 36px;
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 160px;
      align-items: start;
      gap: 40px;
      border-bottom: 1px solid var(--border);
    }
    .hero-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--wood);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hero-eyebrow::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
      max-width: 80px;
    }
    .hero h1 {
      font-size: clamp(28px, 3.5vw, 42px);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0.02em;
    }
    .hero h1 span { color: var(--wood); }
    .hero-desc {
      font-size: 14px;
      color: var(--ink3);
      margin-top: 12px;
      font-weight: 300;
      line-height: 1.8;
    }
    .stat-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-top: 8px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px 18px;
      text-align: center;
    }
    .stat-n {
      font-family: 'DM Mono', monospace;
      font-size: 32px;
      color: var(--wood);
      line-height: 1;
    }
    .stat-l {
      font-size: 11px;
      color: var(--ink3);
      margin-top: 5px;
      letter-spacing: 0.06em;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      padding: 0 40px;
      max-width: 960px;
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      font-family: 'DM Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 15px 18px;
      background: none;
      border: none;
      color: var(--ink3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.18s, border-color 0.18s;
      font-family: 'DM Mono', monospace;
    }
    .tab.active { color: var(--wood-dark); border-bottom-color: var(--wood); }
    .tab:hover:not(.active) { color: var(--ink2); }

    /* ── GALLERY ── */
    .gallery {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(268px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      animation: rise 0.35s ease both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 24px rgba(122,85,51,0.1);
      border-color: var(--wood-pale);
    }
    .card-thumb {
      height: 130px;
      background: var(--tag-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      position: relative;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .rank-pip {
      position: absolute;
      top: 10px; left: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      padding: 3px 8px;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--wood-dark);
      letter-spacing: 0.04em;
    }
    .card-body { padding: 16px 18px; }
    .card-title { font-size: 15.5px; font-weight: 600; line-height: 1.4; margin-bottom: 3px; }
    .card-by { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink3); margin-bottom: 11px; }
    .tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 11px; }
    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 9.5px;
      padding: 3px 8px;
      background: var(--tag-bg);
      color: var(--ink2);
      border-radius: 2px;
    }
    .card-desc {
      font-size: 12px;
      color: var(--ink2);
      line-height: 1.8;
      margin-bottom: 15px;
      font-weight: 300;
    }
    .vote-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 13px;
      border-top: 1px solid var(--border);
    }
    .vnum { font-family: 'DM Mono', monospace; font-size: 22px; color: var(--wood); line-height: 1; }
    .vunit { font-size: 10px; color: var(--ink3); margin-top: 3px; }
    .vote-btn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 9px 16px;
      background: none;
      border: 1px solid var(--wood);
      color: var(--wood);
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.16s;
    }
    .vote-btn:hover:not(:disabled) { background: var(--wood); color: white; }
    .vote-btn.voted { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); cursor: default; }

    /* ── LEADERBOARD ── */
    .board {
      max-width: 680px;
      margin: 0 auto;
      padding: 32px 40px;
    }
    .section-head {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink3);
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .lb-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 0;
      border-bottom: 1px solid var(--border);
      animation: rise 0.3s ease both;
    }
    .lb-rank { font-family: 'DM Mono', monospace; font-size: 18px; width: 32px; text-align: center; flex-shrink: 0; color: var(--wood-pale); }
    .lb-rank.top { color: var(--warm); }
    .lb-info { flex: 1; }
    .lb-name { font-size: 15px; font-weight: 600; }
    .lb-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink3); margin-top: 3px; }
    .lb-bar { height: 2px; background: var(--border); margin-top: 8px; border-radius: 1px; overflow: hidden; }
    .lb-fill { height: 100%; background: linear-gradient(90deg, var(--wood-pale), var(--wood)); border-radius: 1px; transition: width 0.6s ease; }
    .lb-votes { font-family: 'DM Mono', monospace; font-size: 24px; color: var(--wood); min-width: 36px; text-align: right; }

    /* ── SUBMIT ── */
    .submit {
      max-width: 540px;
      margin: 0 auto;
      padding: 32px 40px;
    }
    .submit-head { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .submit-head h2 { font-size: 20px; font-weight: 600; margin-bottom: 5px; }
    .submit-head p { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink3); line-height: 1.7; }
    .field { margin-bottom: 15px; }
    .field label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink2);
      margin-bottom: 7px;
    }
    .field input, .field textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--ink);
      padding: 10px 13px;
      font-family: 'Noto Serif TC', serif;
      font-size: 14px;
      outline: none;
      border-radius: 2px;
      transition: border-color 0.16s;
      resize: vertical;
    }
    .field input:focus, .field textarea:focus { border-color: var(--wood); }
    .field input::placeholder, .field textarea::placeholder { color: var(--ink3); font-weight: 300; }
    .submit-btn {
      width: 100%;
      padding: 13px;
      background: var(--wood);
      border: none;
      color: white;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.16s;
      margin-top: 6px;
    }
    .submit-btn:hover { background: var(--wood-dark); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(56px);
      background: var(--ink);
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      padding: 11px 22px;
      border-radius: 2px;
      transition: transform 0.22s ease;
      z-index: 200;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .empty {
      text-align: center;
      padding: 60px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--ink3);
      letter-spacing: 0.1em;
      grid-column: 1/-1;
    }

    @media (max-width: 640px) {
      .hero { grid-template-columns: 1fr; padding: 32px 20px 24px; }
      .stat-col { display: none; }
      .tabs, .gallery, .board, .submit { padding-left: 20px; padding-right: 20px; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-mark">木</div>
    大業實驗中學 STEAM
  </div>
  <div class="header-right">七年級下學期 · Automata 票選</div>
</header>

<div class="hero">
  <div>
    <div class="hero-eyebrow">木都嘉義 · 在地機械玩具設計</div>
    <h1>Automata<br><span>作品票選展</span></h1>
    <p class="hero-desc">每一件作品都說著一個嘉義的故事。<br>選出你心目中最有嘉義味的設計。</p>
  </div>
  <div class="stat-col">
    <div class="stat-card">
      <div class="stat-n" id="totalVotes">0</div>
      <div class="stat-l">累計票數</div>
    </div>
    <div class="stat-card">
      <div class="stat-n" id="totalWorks">0</div>
      <div class="stat-l">件作品</div>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="gallery">所有作品</button>
  <button class="tab" data-tab="board">排行榜</button>
  <button class="tab" data-tab="submit">上傳作品</button>
</div>

<!-- GALLERY -->
<div id="pane-gallery" class="gallery"></div>

<!-- LEADERBOARD -->
<div id="pane-board" class="board" style="display:none">
  <div class="section-head" id="board-head">票數排行</div>
  <div id="board-list"></div>
</div>

<!-- SUBMIT -->
<div id="pane-submit" class="submit" style="display:none">
  <div class="submit-head">
    <h2>上傳作品</h2>
    <p>填寫後立即出現在票選頁面。<br>凸輪原理和嘉義連結都要寫清楚。</p>
  </div>
  <form id="submit-form">
    <div class="field"><label>姓名 *</label><input name="name" placeholder="你的名字" required></div>
    <div class="field"><label>作品名稱 *</label><input name="title" placeholder="例：阿里山小火車穿山洞" required></div>
    <div class="field"><label>嘉義主題</label><input name="theme" placeholder="例：阿里山鐵路、嘉義美食…"></div>
    <div class="field"><label>機構動作</label><input name="motion" placeholder="例：往復運動、弧線下擺…"></div>
    <div class="field"><label>作品照片網址（選填）</label><input name="imageUrl" placeholder="貼上公開圖片連結"></div>
    <div class="field">
      <label>設計說明 *（凸輪原理 + 嘉義故事）</label>
      <textarea name="description" rows="5" placeholder="說明你的機構原理，以及作品和嘉義的連結…" required></textarea>
    </div>
    <button type="submit" class="submit-btn">確認上傳</button>
  </form>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, runTransaction, serverTimestamp }
                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ── Firebase config ── */
const firebaseConfig = {
  apiKey:            "AIzaSyBYZdHHe5LcPvG5Ahnl-ZV4lpv9Ns6GnlM",
  authDomain:        "automata-8605c.firebaseapp.com",
  databaseURL:       "https://automata-8605c-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "automata-8605c",
  storageBucket:     "automata-8605c.firebasestorage.app",
  messagingSenderId: "187407752224",
  appId:             "1:187407752224:web:b7fd2eaf68d6110d4af045"
};

const EMOJIS = ["⚙️","🌲","🍗","🦢","🚂","🏮","🌾","🎋","🪘","🌊"];
const DEMO = [
  { id:"d1", name:"林同學", title:"阿里山小火車穿山洞", theme:"阿里山鐵路", motion:"往復運動",
    description:"用偏心圓凸輪讓火車做往復運動，穿過用瓦楞紙板做的山洞，每次轉一圈就像火車進站出站。底盤用木板，山洞和車廂用回收材料。",
    votes:7, emoji:"🚂" },
  { id:"d2", name:"陳同學", title:"火雞肉飯老闆剁肉", theme:"嘉義美食", motion:"重複敲擊",
    description:"蝸牛形凸輪讓刀子快起慢落，模仿老師傅剁肉的節奏。角色用超輕土捏出老闆的手勢，寶特瓶蓋當砧板。",
    votes:12, emoji:"🍗" },
  { id:"d3", name:"黃同學", title:"八掌溪白鷺鷥捕魚", theme:"嘉義生態", motion:"弧線下擺",
    description:"橢圓形凸輪讓鳥頭做弧線下擺的動作，像真的在捕魚。鳥的身體用金屬絲彎出來，翅膀用衛生紙黏塑形。",
    votes:9, emoji:"🦢" },
];

/* ── Init ── */
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const LS_KEY = "automata_voted_v3";
function getVoted() { try { return new Set(JSON.parse(localStorage.getItem(LS_KEY)) || []); } catch { return new Set(); } }
function addVoted(id) { const s = getVoted(); s.add(id); localStorage.setItem(LS_KEY, JSON.stringify([...s])); }

/* ── Tabs ── */
let currentTab = "gallery";
document.querySelectorAll(".tab").forEach(btn => {
  btn.addEventListener("click", () => {
    currentTab = btn.dataset.tab;
    document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    ["gallery","board","submit"].forEach(id => {
      document.getElementById("pane-"+id).style.display = id === currentTab ? (id === "gallery" ? "grid" : "block") : "none";
    });
  });
});

/* ── Render card ── */
function makeCard(w, rank, voted) {
  const div = document.createElement("div");
  div.className = "card";
  div.style.animationDelay = (rank * 0.05) + "s";
  div.innerHTML = `
    <div class="card-thumb">
      ${w.imageUrl ? `<img src="${w.imageUrl}" alt="${w.title}">` : `<span>${w.emoji || EMOJIS[rank % EMOJIS.length]}</span>`}
      ${rank < 3 ? `<div class="rank-pip">No.${rank+1}</div>` : ""}
    </div>
    <div class="card-body">
      <div class="card-title">${w.title}</div>
      <div class="card-by">${w.name}</div>
      <div class="tags">
        ${w.theme  ? `<span class="tag">${w.theme}</span>`  : ""}
        ${w.motion ? `<span class="tag">${w.motion}</span>` : ""}
      </div>
      <p class="card-desc">${w.description}</p>
      <div class="vote-row">
        <div>
          <div class="vnum" id="vc-${w.id}">${w.votes || 0}</div>
          <div class="vunit">票</div>
        </div>
        <button class="vote-btn ${voted ? 'voted' : ''}" id="vb-${w.id}" data-id="${w.id}" ${voted ? 'disabled' : ''}>
          ${voted ? "已投票 ✓" : "投　票"}
        </button>
      </div>
    </div>`;
  return div;
}

/* ── Toast ── */
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

/* ── Live data ── */
let works = [];
onValue(ref(db, "works"), snap => {
  const data = snap.val();
  works = data ? Object.entries(data).map(([id, v]) => ({ id, ...v })) : DEMO;

  // Sort by votes desc
  const sorted = [...works].sort((a,b) => (b.votes||0)-(a.votes||0));
  const voted  = getVoted();
  const total  = works.reduce((s,w) => s+(w.votes||0), 0);

  document.getElementById("totalVotes").textContent = total;
  document.getElementById("totalWorks").textContent = works.length;

  // Gallery
  const gallery = document.getElementById("pane-gallery");
  gallery.innerHTML = "";
  if (!works.length) { gallery.innerHTML = '<div class="empty">尚無作品，快去上傳</div>'; }
  sorted.forEach((w, i) => gallery.appendChild(makeCard(w, i, voted.has(w.id))));

  // Board
  const maxV = sorted[0]?.votes || 1;
  document.getElementById("board-head").textContent = `票數排行 — ${works.length} 件作品`;
  const boardList = document.getElementById("board-list");
  boardList.innerHTML = "";
  sorted.forEach((w, i) => {
    const row = document.createElement("div");
    row.className = "lb-row";
    row.style.animationDelay = (i*0.04)+"s";
    row.innerHTML = `
      <div class="lb-rank ${i<3?'top':''}">${["🥇","🥈","🥉"][i] || i+1}</div>
      <div class="lb-info">
        <div class="lb-name">${w.title}</div>
        <div class="lb-meta">${w.name}${w.theme ? ' · '+w.theme : ''}</div>
        <div class="lb-bar"><div class="lb-fill" style="width:${((w.votes||0)/maxV*100)}%"></div></div>
      </div>
      <div class="lb-votes">${w.votes||0}</div>`;
    boardList.appendChild(row);
  });

  // Re-attach vote handlers
  document.querySelectorAll(".vote-btn:not([disabled])").forEach(btn => {
    btn.addEventListener("click", async () => {
      const id = btn.dataset.id;
      if (getVoted().has(id)) return;
      btn.disabled = true; btn.textContent = "…";
      await runTransaction(ref(db, `works/${id}/votes`), v => (v||0)+1);
      addVoted(id);
      btn.classList.add("voted"); btn.textContent = "已投票 ✓";
      toast("已投票 ✓");
    });
  });
});

/* ── Submit form ── */
document.getElementById("submit-form").addEventListener("submit", async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const w = {
    name:        fd.get("name"),
    title:       fd.get("title"),
    theme:       fd.get("theme"),
    motion:      fd.get("motion"),
    description: fd.get("description"),
    imageUrl:    fd.get("imageUrl"),
    votes:       0,
    emoji:       EMOJIS[Math.floor(Math.random()*EMOJIS.length)],
    createdAt:   serverTimestamp()
  };
  await push(ref(db, "works"), w);
  e.target.reset();
  toast("上傳成功 ✓");
  document.querySelector('[data-tab="gallery"]').click();
});
</script>
</body>
</html>
